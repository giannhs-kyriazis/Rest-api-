name: Security Scan (Trivy + Gitleaks + Semgrep)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  trivy-scan:
    name: Trivy (dependencies & IaC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy & Save Output as JSON
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true          # αγνοεί CVEs χωρίς διαθέσιμο fix (δεν μπορείς να κάνεις κάτι ούτως ή άλλως)
          skip-dirs: 'tests,node_modules,vendor,.venv'
          trivyignores: '.trivyignore'  # χειροκίνητο ignore-list για συγκεκριμένα CVEs που δεν αφορούν

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      - name: Send Trivy JSON to Webhook
        if: always()
        run: |
          curl -s -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Client-Name: Giannhs-Sql-Project" \
            -H "X-Scan-Tool: trivy" \
            -d @trivy-results.json

  gitleaks-scan:
    name: Gitleaks (secrets detection)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks with config & baseline
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml         # allowlist για dummy/example keys, test paths
          GITLEAKS_BASELINE_PATH: gitleaks-baseline.json  # αγνοεί ήδη γνωστά/παλιά ευρήματα
        continue-on-error: true

      - name: Send Gitleaks report to Webhook
        if: always()
        run: |
          if [ -f gitleaks-report.json ]; then
            curl -s -X POST "${{ secrets.WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -H "X-Client-Name: Giannhs-Sql-Project" \
              -H "X-Scan-Tool: gitleaks" \
              -d @gitleaks-report.json
          else
            echo "No gitleaks-report.json found (no leaks or different output path)."
          fi

  semgrep-scan:
    name: Semgrep (static code analysis)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep (baseline diff on PRs, full scan on push to main)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Σε PR: δείχνει ΜΟΝΟ νέα ευρήματα σε σχέση με το base branch
            semgrep ci \
              --baseline-commit=${{ github.event.pull_request.base.sha }} \
              --config p/python --config p/flask --config p/security-audit \
              --exclude tests --exclude node_modules --exclude vendor \
              --json --output semgrep-raw.json
          else
            semgrep scan \
              --config p/python --config p/flask --config p/security-audit \
              --exclude tests --exclude node_modules --exclude vendor \
              --json --output semgrep-raw.json
          fi
        continue-on-error: true

      - name: Filter out LOW confidence findings (reduce noise)
        run: |
          jq '.results |= map(select(.extra.metadata.confidence != "LOW"))' \
            semgrep-raw.json > semgrep-results.json

      - name: Upload Semgrep results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json

      - name: Send Semgrep JSON to Webhook
        if: always()
        run: |
          curl -s -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Client-Name: Giannhs-Sql-Project" \
            -H "X-Scan-Tool: semgrep" \
            -d @semgrep-results.json
